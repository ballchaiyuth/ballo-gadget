name: Java CI with Maven

on:
  push:
    branches: [ "develop", "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'corretto'
        cache: maven
        
    - name: Build with Maven
      run: ./mvnw -Pprod clean verify -f services/java-bff/pom.xml
      # -Pprod is used if there are specific profiles, otherwise just verify is fine.
      # verify runs tests and any checkstyle/linting plugins you might add.
